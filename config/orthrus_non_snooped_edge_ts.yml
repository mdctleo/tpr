# Simply Orthrus' config, without test data during training text embeddings + without clustering after thresholding
# to avoid data snooping. This config is thus orthrus without the "cheating" techniques for fair comparison.

_include_yml: orthrus

featurization:
  training_split: train

batching:
  edge_features: edge_type, time_encoding
  intra_graph_batching:
    tgn_last_neighbor:
      fix_tgn_neighbor_loader: True
training:
  enable_batch_timing: true     # Enable timing instrumentation for KDE-eligible batches
  batch_timing_vectors_dir: "kde_vectors"  # Path to KDE vectors for taint identification (baseline config)
  batch_timing_min_occurrences: 10         # Min occurrences threshold for taint tracking
  lr: 0.0001
  node_out_dim: 128
  encoder:
    dropout: 0.3
    
evaluation:
  node_evaluation:
    use_kmeans: False